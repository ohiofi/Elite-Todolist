<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>
  <body>
    <script src="./Classes/Color.js"></script>
    <script src="./Classes/ColorPalette.js"></script>
    <script src="./Classes/Task.js"></script>
    <script src="./Classes/List.js"></script>
    <script src="./Classes/Bar.js"></script>
    <script src="./Classes/ArchiveList.js"></script>
    <script src="./Classes/Menu.js"></script>
    <script src="./Classes/Modal.js"></script>
    <script src="sketch.js"></script>
    <dialog id="taskModal"> 
      <h2>Add New Task</h2>
      <label for="taskDesc">Task Name:</label>
      <input type="text" id="taskName" name="taskName"><br><br>
      <label for="taskDesc">Task Description:</label>
      <input type="text" id="taskDesc" name="taskDesc"><br><br>
      <button class ="close-modal">Close</button>
      <button class ="save-button">Add</button>
    </dialog>
    <dialog id="listModal"> 
      <h2>Add New List</h2>
      <label for="listName">List Name:</label>
      <input type="text" id="listName" name="listName"><br><br>
      <button class="close-button">Close</button>
      <button class ="save-button">Add</button>
    </dialog>
    <dialog id = "confirmModal">
      <h2>Are you sure?</h2>
      <button class="close-button">No</button>
      <button class ="save-button">Yes</button>
    </dialog>
  
  </body>
</html>
